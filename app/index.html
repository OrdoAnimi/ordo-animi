<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VALOUR Pilot Console</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e8e0d0;
        background: #0f0d0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #17130f 0%, #0d0c0b 100%);
      }

      .fallback-shell {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .fallback-panel {
        border: 1px solid rgba(232, 224, 208, 0.14);
        border-radius: 28px;
        background: rgba(24, 21, 17, 0.92);
        padding: 36px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #cb9a5d;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 5.2rem);
        line-height: 0.95;
      }

      p {
        color: #c0b4a1;
        line-height: 1.65;
        max-width: 760px;
      }

      .status {
        display: inline-block;
        margin-top: 16px;
        border: 1px solid rgba(203, 154, 93, 0.4);
        border-radius: 999px;
        padding: 8px 14px;
        color: #f0cd96;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="fallback-shell">
        <section class="fallback-panel">
          <p class="eyebrow">VALOUR Pilot Console v0.1</p>
          <h1>Private operator workspace</h1>
          <p>
            Static fallback is visible. This confirms the browser can load the application shell even before React takes over.
          </p>
          <p>
            Pilot mapping: pilot/runs/pilot-001-architecture-review-board/
          </p>
          <span class="status">fallback alive</span>
        </section>
      </main>
    </div>
  </body>
</html>
